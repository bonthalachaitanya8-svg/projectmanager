<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/></head>
<body>

<nav th:fragment="adminNavbar" class="navbar navbar-expand-lg navbar-dark" style="background:#1e3a5f;">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">
            <i class="bi bi-kanban-fill me-2"></i>Project Manager
            <span class="badge bg-danger ms-2">Admin</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/projects}"><i class="bi bi-folder me-1"></i>Projects</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people me-1"></i>Users</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/tickets}"><i class="bi bi-ticket me-1"></i>Tickets</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/submissions}"><i class="bi bi-cloud-upload me-1"></i>Submissions</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Admin</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<nav th:fragment="userNavbar" class="navbar navbar-expand-lg navbar-dark" style="background:#1565c0;">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/user/dashboard">
            <i class="bi bi-kanban-fill me-2"></i>Project Manager
            <span class="badge bg-light text-primary ms-2">My Portal</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#userNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="userNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/user/dashboard}"><i class="bi bi-grid me-1"></i>My Projects</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/project/new}"><i class="bi bi-plus-circle me-1"></i>New Project</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/tickets}"><i class="bi bi-ticket me-1"></i>My Tickets</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/user/contact}"><i class="bi bi-envelope me-1"></i>Contact Admin</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
