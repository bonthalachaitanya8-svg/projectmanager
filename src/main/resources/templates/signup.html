<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign Up — Project Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden; padding: 20px 0;
        }
        canvas#particles { position: fixed; top: 0; left: 0; z-index: 0; }
        .signup-wrapper { position: relative; z-index: 1; width: 100%; max-width: 480px; padding: 20px; }
        .signup-card {
            background: rgba(255,255,255,0.07); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
            overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
        .signup-header { background: linear-gradient(135deg, #1e3a5f, #1565c0); padding: 2rem; text-align: center; }
        .signup-header .brand-icon { font-size: 3rem; color: #00b4d8; margin-bottom: 0.5rem; }
        .signup-header h4 { color: white; font-weight: 700; }
        .signup-header p { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
        .signup-body { padding: 2rem; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 10px; padding: 0.75rem 1rem; transition: all 0.3s; }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-control:focus { background: rgba(255,255,255,0.15); border-color: #00b4d8; box-shadow: 0 0 0 3px rgba(0,180,216,0.25); color: white; }
        .form-label { color: rgba(255,255,255,0.85); font-weight: 500; font-size: 0.9rem; }
        .input-group-text { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }
        .btn-register { background: linear-gradient(135deg, #00b4d8, #0096c7); border: none; border-radius: 10px; padding: 0.8rem; font-size: 1rem; font-weight: 600; color: white; width: 100%; transition: all 0.3s; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,180,216,0.4); color: white; }
        .btn-back { background: transparent; border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; padding: 0.7rem; font-size: 1rem; font-weight: 600; color: rgba(255,255,255,0.85); width: 100%; transition: all 0.3s; text-decoration: none; display: block; text-align: center; margin-top: 0.75rem; }
        .btn-back:hover { border-color: #00b4d8; color: #00b4d8; }
        .alert-danger { background: rgba(220,53,69,0.2); border: 1px solid rgba(220,53,69,0.4); color: #ff6b6b; border-radius: 10px; }
        .alert-info { background: rgba(0,180,216,0.15); border: 1px solid rgba(0,180,216,0.3); color: #90e0ef; border-radius: 10px; font-size: 0.88rem; }
        footer { color: rgba(255,255,255,0.3); font-size: 0.78rem; text-align: center; margin-top: 1.5rem; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="signup-wrapper">
    <div class="signup-card">
        <div class="signup-header">
            <div class="brand-icon"><i class="bi bi-person-plus-fill"></i></div>
            <h4>Create Account</h4>
            <p>Join Project Manager</p>
        </div>
        <div class="signup-body">
            <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center mb-3">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
            </div>
            <form th:action="@{/signup}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                            <input type="text" name="fullName" class="form-control" placeholder="John Doe" th:value="${fullName}"/>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="john@example.com" th:value="${email}"/>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-at"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Choose a username" required th:value="${username}"/>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Min 6 chars" required minlength="6"/>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password" required minlength="6"/>
                        </div>
                    </div>
                </div>
                <div class="alert alert-info mt-3 mb-3">
                    <i class="bi bi-info-circle me-1"></i>
                    New accounts are created as <strong>User</strong> role. Contact admin for elevated access.
                </div>
                <button type="submit" class="btn-register">
                    <i class="bi bi-person-check me-2"></i>Create Account
                </button>
            </form>
            <a th:href="@{/login}" class="btn-back">
                <i class="bi bi-arrow-left me-2"></i>Back to Login
            </a>
        </div>
    </div>
    <footer>&copy; 2026 Chaitanya. All rights reserved.</footer>
</div>
<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
const particles = Array.from({length: 80}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    r: Math.random()*2.5+0.5, dx: (Math.random()-0.5)*0.5, dy: (Math.random()-0.5)*0.5, o: Math.random()*0.5+0.1
}));
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,180,216,${p.o})`; ctx.fill();
        p.x+=p.dx; p.y+=p.dy;
        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });
    particles.forEach((a,i) => particles.slice(i+1).forEach(b => {
        const d=Math.hypot(a.x-b.x,a.y-b.y);
        if(d<100){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,180,216,${0.15*(1-d/100)})`;ctx.lineWidth=0.5;ctx.stroke();}
    }));
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
