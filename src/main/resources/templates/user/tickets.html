<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body { background: #f0f2f5; } .table-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }</style>
</head>
<body>
<div th:replace="~{fragments :: userNavbar}"></div>
<div class="container py-4">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0"><i class="bi bi-ticket me-2"></i>My Tickets</h5>
        <a th:href="@{/user/contact}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>New Ticket
        </a>
    </div>
    <div class="card table-card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr><th class="ps-3">Subject</th><th>Priority</th><th>Status</th><th>Submitted</th><th>Admin Reply</th></tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${tickets}">
                        <td class="ps-3 fw-semibold" th:text="${t.subject}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${t.priority == 'HIGH'} ? 'bg-danger' : (${t.priority == 'MEDIUM'} ? 'bg-warning text-dark' : 'bg-info text-dark')"
                                  th:text="${t.priority}"></span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${t.status == 'OPEN'} ? 'bg-primary' : (${t.status == 'RESOLVED'} ? 'bg-success' : 'bg-warning text-dark')"
                                  th:text="${t.status}"></span>
                        </td>
                        <td class="small text-muted" th:text="${#temporals.format(t.createdAt, 'dd MMM yyyy')}"></td>
                        <td>
                            <span th:if="${t.adminReply != null}" class="small text-success">
                                <i class="bi bi-check-circle me-1"></i>Replied
                            </span>
                            <span th:if="${t.adminReply == null}" class="small text-muted">Pending</span>
                        </td>
                    </tr>
                    <tr th:if="${tickets.empty}">
                        <td colspan="5" class="text-center py-4 text-muted">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            No tickets yet. <a th:href="@{/user/contact}">Submit one</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<footer class="text-center py-3 mt-4 text-muted border-top" style="font-size:0.78rem;">&copy; 2026 Chaitanya. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
