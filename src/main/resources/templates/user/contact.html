<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contact Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body { background: #f0f2f5; } .form-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }</style>
</head>
<body>
<div th:replace="~{fragments :: userNavbar}"></div>
<div class="container py-4" style="max-width:700px">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/user/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item active">Contact Admin</li>
        </ol>
    </nav>
    <div class="card form-card">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-1"><i class="bi bi-envelope me-2"></i>Contact Admin</h5>
            <p class="text-muted small mb-4">Submit a ticket and admin will respond to you.</p>
            <form th:action="@{/user/contact}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Subject <span class="text-danger">*</span></label>
                    <input type="text" name="subject" class="form-control" placeholder="Brief description of your request" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Priority</label>
                    <select name="priority" class="form-select">
                        <option value="LOW">🔵 Low</option>
                        <option value="MEDIUM" selected>🟢 Medium</option>
                        <option value="HIGH">🔴 High</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Message <span class="text-danger">*</span></label>
                    <textarea name="message" class="form-control" rows="5"
                              placeholder="Describe your request in detail..." required></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-send me-1"></i>Submit Ticket
                    </button>
                    <a th:href="@{/user/tickets}" class="btn btn-outline-secondary">View My Tickets</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer class="text-center py-3 mt-4 text-muted border-top" style="font-size:0.78rem;">&copy; 2026 Chaitanya. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
