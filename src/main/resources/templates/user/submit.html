<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Submit Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .form-card { border: none; border-radius: 14px; box-shadow: 0 2px 14px rgba(0,0,0,0.08); }
        .upload-area {
            border: 2px dashed #1565c0;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            background: #f0f7ff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover { background: #e3f0ff; border-color: #0d47a1; }
        .upload-area i { font-size: 2.5rem; color: #1565c0; }
        .history-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
<div th:replace="~{fragments :: userNavbar}"></div>

<div class="container py-4" style="max-width:800px">

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Submit Form -->
    <div class="card form-card mb-4">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-1"><i class="bi bi-cloud-upload me-2 text-primary"></i>Submit Your Project</h5>
            <p class="text-muted small mb-4">Upload your project ZIP file and/or provide your GitHub repository link.</p>

            <form th:action="@{/user/submit}" method="post" enctype="multipart/form-data">

                <!-- Upload Area -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Project ZIP File</label>
                    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                        <i class="bi bi-folder-symlink mb-2 d-block"></i>
                        <div class="fw-semibold text-primary">Click to upload ZIP file</div>
                        <div class="text-muted small mt-1">Drag & drop or click to browse</div>
                        <div id="fileName" class="mt-2 small text-success fw-semibold"></div>
                    </div>
                    <input type="file" id="fileInput" name="file" accept=".zip,.rar,.tar,.gz"
                           class="d-none" onchange="showFileName(this)"/>
                    <div class="form-text">Accepted: ZIP, RAR, TAR, GZ files</div>
                </div>

                <!-- GitHub Link -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">GitHub Repository Link</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-github"></i></span>
                        <input type="url" name="githubLink" class="form-control"
                               placeholder="https://github.com/username/repository"/>
                    </div>
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" class="form-control" rows="3"
                              placeholder="Brief description of your project..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-send me-1"></i>Submit Project
                </button>
            </form>
        </div>
    </div>

    <!-- Submission History -->
    <div class="card history-card" th:if="${!submissions.empty}">
        <div class="card-header bg-white border-0 pt-3">
            <h6 class="fw-bold mb-0"><i class="bi bi-clock-history me-2"></i>My Submissions</h6>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">File</th>
                        <th>GitHub Link</th>
                        <th>Description</th>
                        <th>Submitted</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${submissions}">
                        <td class="ps-3">
                            <span th:if="${s.fileName != null}" class="badge bg-primary">
                                <i class="bi bi-file-zip me-1"></i>
                                <span th:text="${s.fileName}"></span>
                            </span>
                            <span th:if="${s.fileName == null}" class="text-muted small">No file</span>
                        </td>
                        <td>
                            <a th:if="${s.githubLink != null and !s.githubLink.isEmpty()}"
                               th:href="${s.githubLink}" target="_blank" class="text-truncate d-inline-block" style="max-width:180px;">
                                <i class="bi bi-github me-1"></i>
                                <span th:text="${s.githubLink}"></span>
                            </a>
                            <span th:if="${s.githubLink == null or s.githubLink.isEmpty()}" class="text-muted small">—</span>
                        </td>
                        <td class="small text-muted" th:text="${#strings.abbreviate(s.description, 40)}"></td>
                        <td class="small text-muted" th:text="${#temporals.format(s.submittedAt, 'dd MMM yyyy')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="text-center py-3 mt-4 text-muted border-top" style="font-size:0.78rem;">&copy; 2026 Chaitanya. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showFileName(input) {
    const name = input.files[0]?.name || '';
    document.getElementById('fileName').textContent = name ? '✓ ' + name + ' selected' : '';
}
</script>
</body>
</html>
