<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isNew} ? 'New Project' : 'Edit Project'">Project Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .form-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .member-row { background: #f8f9fa; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; }
        .upload-area { border: 2px dashed #1e3a5f; border-radius: 10px; padding: 1.5rem; text-align: center; background: #f0f4ff; cursor: pointer; transition: all 0.2s; }
        .upload-area:hover { background: #e3ecff; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: adminNavbar}"></div>

<div class="container py-4" style="max-width: 860px;">

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item active" th:text="${isNew} ? 'New Project' : 'Edit Project'"></li>
        </ol>
    </nav>

    <div class="card form-card mb-4">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-4" th:text="${isNew} ? 'Create New Project' : 'Edit Project'"></h5>

            <form th:action="@{/admin/project/save}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" th:if="${project.id != null}" name="id" th:value="${project.id}"/>
                <input type="hidden" th:if="${project.filePath != null}" name="filePath" th:value="${project.filePath}"/>
                <input type="hidden" th:if="${project.fileName != null}" name="fileName" th:value="${project.fileName}"/>

                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label fw-semibold">Project Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" th:value="${project.name}" required/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Status</label>
                        <select name="status" class="form-select">
                            <option value="PLANNING" th:selected="${project.status == 'PLANNING'}">Planning</option>
                            <option value="ACTIVE" th:selected="${project.status == 'ACTIVE'}">Active</option>
                            <option value="ON_HOLD" th:selected="${project.status == 'ON_HOLD'}">On Hold</option>
                            <option value="COMPLETED" th:selected="${project.status == 'COMPLETED'}">Completed</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control" rows="2" th:text="${project.description}"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Full Briefing</label>
                        <textarea name="briefing" class="form-control" rows="3" th:text="${project.briefing}"></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Priority</label>
                        <select name="priority" class="form-select">
                            <option value="LOW" th:selected="${project.priority == 'LOW'}">Low</option>
                            <option value="MEDIUM" th:selected="${project.priority == 'MEDIUM'}">Medium</option>
                            <option value="HIGH" th:selected="${project.priority == 'HIGH'}">High</option>
                            <option value="CRITICAL" th:selected="${project.priority == 'CRITICAL'}">Critical</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Start Date</label>
                        <input type="date" name="startDate" class="form-control" th:value="${project.startDate}"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">End Date</label>
                        <input type="date" name="endDate" class="form-control" th:value="${project.endDate}"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Assign to User</label>
                        <select name="ownerId" class="form-select">
                            <option value="">— Select User —</option>
                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:text="${u.fullName != null && !u.fullName.isEmpty() ? u.fullName + ' (' + u.username + ')' : u.username}"
                                    th:selected="${project.owner != null && project.owner.id == u.id}">
                            </option>
                        </select>
                    </div>

                    <!-- GitHub Link -->
                    <div class="col-12">
                        <label class="form-label fw-semibold"><i class="bi bi-github me-1"></i>GitHub Repository Link</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-github"></i></span>
                            <input type="url" name="githubLink" class="form-control"
                                   placeholder="https://github.com/username/repository"
                                   th:value="${project.githubLink}"/>
                        </div>
                    </div>

                    <!-- File Upload -->
                    <div class="col-12">
                        <label class="form-label fw-semibold"><i class="bi bi-folder-symlink me-1"></i>Project Files (ZIP)</label>

                        <!-- Show existing file if any -->
                        <div th:if="${project.fileName != null}" class="alert alert-info py-2 mb-2">
                            <i class="bi bi-file-zip me-2"></i>
                            Current file: <strong th:text="${project.fileName}"></strong>
                            <a th:href="@{/admin/project/{id}/download(id=${project.id})}"
                               class="btn btn-sm btn-outline-primary ms-2">
                                <i class="bi bi-download me-1"></i>Download
                            </a>
                        </div>

                        <div class="upload-area" onclick="document.getElementById('projectFile').click()">
                            <i class="bi bi-cloud-upload fs-3 text-primary d-block mb-1"></i>
                            <div class="fw-semibold text-primary small">Click to upload ZIP file</div>
                            <div class="text-muted" style="font-size:0.8rem;">ZIP, RAR, TAR accepted</div>
                            <div id="selectedFile" class="mt-2 small text-success fw-semibold"></div>
                        </div>
                        <input type="file" id="projectFile" name="projectFile"
                               accept=".zip,.rar,.tar,.gz" class="d-none"
                               onchange="document.getElementById('selectedFile').textContent = this.files[0]?.name ? '✓ ' + this.files[0].name : ''"/>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${isNew} ? 'Create Project' : 'Save Changes'"></span>
                    </button>
                    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Team Members -->
    <div class="card form-card" th:if="${!isNew}">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-people-fill me-2"></i>Team Members</h5>

            <div th:if="${project.teamMembers != null and !project.teamMembers.empty}">
                <div class="member-row d-flex justify-content-between align-items-center"
                     th:each="m : ${project.teamMembers}">
                    <div>
                        <div class="fw-semibold" th:text="${m.name}"></div>
                        <div class="text-muted small" th:text="${m.role}"></div>
                    </div>
                    <a th:href="@{/admin/member/{mid}/delete/project/{pid}(mid=${m.id}, pid=${project.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Remove this member?')">
                        <i class="bi bi-person-dash"></i>
                    </a>
                </div>
            </div>

            <form th:action="@{/admin/project/{id}/member/add(id=${project.id})}" method="post" class="mt-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="row g-2 align-items-end">
                    <div class="col-md-4">
                        <input type="text" name="name" class="form-control form-control-sm" placeholder="Member name" required/>
                    </div>
                    <div class="col-md-3">
                        <input type="text" name="role" class="form-control form-control-sm" placeholder="Role"/>
                    </div>
                    <div class="col-md-3">
                        <input type="email" name="email" class="form-control form-control-sm" placeholder="Email"/>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-sm btn-success w-100">
                            <i class="bi bi-person-plus"></i> Add
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<footer class="text-center py-3 mt-4 text-muted border-top" style="font-size:0.78rem;">&copy; 2026 Chaitanya. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
