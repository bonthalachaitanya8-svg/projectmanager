<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Users — Project Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .table-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .avatar { width: 38px; height: 38px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: adminNavbar}"></div>

<div class="container-fluid py-4 px-4">

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Users</h4>
            <p class="text-muted mb-0">Manage all system users</p>
        </div>
        <a th:href="@{/admin/user/new}" class="btn btn-primary">
            <i class="bi bi-person-plus me-1"></i>Add User
        </a>
    </div>

    <div class="card table-card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">User</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Projects</th>
                        <th class="text-end pe-3">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td class="ps-3">
                            <div class="d-flex align-items-center gap-3">
                                <div class="avatar text-white"
                                     th:style="${u.role == 'ADMIN'} ? 'background:#d32f2f' : 'background:#1565c0'"
                                     th:text="${#strings.toUpperCase(#strings.substring(u.username, 0, 2))}">
                                </div>
                                <div>
                                    <div class="fw-semibold" th:text="${u.fullName != null && !u.fullName.isEmpty() ? u.fullName : u.username}"></div>
                                    <div class="text-muted small">@<span th:text="${u.username}"></span></div>
                                </div>
                            </div>
                        </td>
                        <td class="small text-muted" th:text="${u.email != null && !u.email.isEmpty() ? u.email : '—'}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${u.role == 'ADMIN'} ? 'bg-danger' : 'bg-primary'"
                                  th:text="${u.role}">
                            </span>
                        </td>
                        <td th:text="${u.projects != null ? u.projects.size() : 0}"></td>
                        <td class="text-end pe-3">
                            <a th:if="${u.role != 'ADMIN'}"
                               th:href="@{/admin/user/delete/{id}(id=${u.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Delete this user?')">
                                <i class="bi bi-trash"></i> Delete
                            </a>
                            <span th:if="${u.role == 'ADMIN'}" class="text-muted small">Protected</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<footer class="text-center py-3 mt-4 text-muted border-top" style="font-size:0.78rem;">&copy; 2026 Chaitanya. All rights reserved.</footer>
</body>
</html>
