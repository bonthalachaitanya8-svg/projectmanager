<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tickets — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body { background: #f0f2f5; } .table-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }</style>
</head>
<body>
<div th:replace="~{fragments :: adminNavbar}"></div>
<div class="container-fluid py-4 px-4">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-ticket me-2"></i>Support Tickets</h4>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 rounded-3 text-center p-3" style="background:#e3f2fd;">
                <div class="fs-2 fw-bold text-primary" th:text="${openCount}">0</div>
                <div class="small text-muted">Open</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 rounded-3 text-center p-3" style="background:#fff8e1;">
                <div class="fs-2 fw-bold text-warning" th:text="${inProgressCount}">0</div>
                <div class="small text-muted">In Progress</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 rounded-3 text-center p-3" style="background:#e8f5e9;">
                <div class="fs-2 fw-bold text-success" th:text="${resolvedCount}">0</div>
                <div class="small text-muted">Resolved</div>
            </div>
        </div>
    </div>

    <div class="card table-card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">Subject</th>
                        <th>From</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th class="text-end pe-3">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${tickets}">
                        <td class="ps-3">
                            <div class="fw-semibold" th:text="${t.subject}"></div>
                            <div class="text-muted small" th:text="${#strings.abbreviate(t.message, 60)}"></div>
                        </td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${t.submittedBy != null ? t.submittedBy.username : 'Unknown'}"></span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${t.priority == 'HIGH'} ? 'bg-danger' : (${t.priority == 'MEDIUM'} ? 'bg-warning text-dark' : 'bg-info text-dark')"
                                  th:text="${t.priority}"></span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${t.status == 'OPEN'} ? 'bg-primary' : (${t.status == 'RESOLVED'} ? 'bg-success' : 'bg-warning text-dark')"
                                  th:text="${t.status}"></span>
                        </td>
                        <td class="small text-muted" th:text="${#temporals.format(t.createdAt, 'dd MMM yyyy')}"></td>
                        <td class="text-end pe-3">
                            <a th:href="@{/admin/ticket/{id}(id=${t.id})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-reply"></i> Reply
                            </a>
                            <a th:href="@{/admin/ticket/{id}/delete(id=${t.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Delete this ticket?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${tickets.empty}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>No tickets yet
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<footer class="text-center py-3 mt-4 text-muted border-top" style="font-size:0.78rem;">&copy; 2026 Chaitanya. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
