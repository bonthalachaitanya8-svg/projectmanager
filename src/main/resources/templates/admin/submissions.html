<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Project Submissions — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .table-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
<div th:replace="~{fragments :: adminNavbar}"></div>

<div class="container-fluid py-4 px-4">

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-cloud-upload me-2"></i>Project Submissions</h4>
        <span class="badge bg-primary fs-6" th:text="${submissions.size()} + ' submissions'"></span>
    </div>

    <div class="card table-card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">User</th>
                        <th>ZIP File</th>
                        <th>GitHub Link</th>
                        <th>Description</th>
                        <th>Submitted</th>
                        <th class="text-end pe-3">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${submissions}">
                        <td class="ps-3">
                            <span class="badge bg-secondary"
                                  th:text="${s.submittedBy != null ? s.submittedBy.username : 'Unknown'}"></span>
                        </td>
                        <td>
                            <span th:if="${s.fileName != null}" class="text-primary fw-semibold small">
                                <i class="bi bi-file-zip me-1"></i>
                                <span th:text="${s.fileName}"></span>
                            </span>
                            <span th:if="${s.fileName == null}" class="text-muted small">No file</span>
                        </td>
                        <td>
                            <a th:if="${s.githubLink != null and !s.githubLink.isEmpty()}"
                               th:href="${s.githubLink}" target="_blank"
                               class="text-truncate d-inline-block text-decoration-none" style="max-width:200px;">
                                <i class="bi bi-github me-1"></i>
                                <span th:text="${s.githubLink}"></span>
                            </a>
                            <span th:if="${s.githubLink == null or s.githubLink.isEmpty()}"
                                  class="text-muted small">—</span>
                        </td>
                        <td class="small text-muted"
                            th:text="${s.description != null ? #strings.abbreviate(s.description, 50) : '—'}"></td>
                        <td class="small text-muted"
                            th:text="${#temporals.format(s.submittedAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td class="text-end pe-3">
                            <a th:if="${s.fileName != null}"
                               th:href="@{/admin/submission/{id}/download(id=${s.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-download"></i> Download
                            </a>
                            <a th:href="@{/admin/submission/{id}/delete(id=${s.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Delete this submission?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${submissions.empty}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                            No submissions yet
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="text-center py-3 mt-4 text-muted border-top" style="font-size:0.78rem;">&copy; 2026 Chaitanya. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
