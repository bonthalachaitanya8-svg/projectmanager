<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Projects — Project Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; }
        .table-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .badge-status { font-size: 0.78rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>
<div th:replace="~{fragments :: adminNavbar}"></div>

<div class="container-fluid py-4 px-4">

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">All Projects</h4>
            <p class="text-muted mb-0" th:text="${projects.size()} + ' projects found'"></p>
        </div>
        <a th:href="@{/admin/project/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>New Project
        </a>
    </div>

    <div class="card table-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">#</th>
                            <th>Project Name</th>
                            <th>Owner</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Team Size</th>
                            <th>Start</th>
                            <th>End</th>
                            <th class="text-end pe-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p, iter : ${projects}">
                            <td class="ps-3 text-muted small" th:text="${iter.count}"></td>
                            <td>
                                <div class="fw-semibold" th:text="${p.name}"></div>
                                <div class="text-muted small" th:text="${#strings.abbreviate(p.description, 60)}"></div>
                            </td>
                            <td>
                                <span class="badge bg-secondary" th:text="${p.owner != null ? p.owner.username : '—'}"></span>
                            </td>
                            <td>
                                <span class="badge-status badge"
                                      th:classappend="${p.status == 'ACTIVE'} ? 'bg-success' : (${p.status == 'COMPLETED'} ? 'bg-primary' : (${p.status == 'ON_HOLD'} ? 'bg-warning text-dark' : 'bg-info text-dark'))"
                                      th:text="${p.status}">
                                </span>
                            </td>
                            <td>
                                <span class="small fw-semibold"
                                      th:style="${p.priority == 'CRITICAL'} ? 'color:#d32f2f' : (${p.priority == 'HIGH'} ? 'color:#f57c00' : (${p.priority == 'MEDIUM'} ? 'color:#388e3c' : 'color:#757575'))"
                                      th:text="${p.priority}">
                                </span>
                            </td>
                            <td th:text="${p.teamMembers != null ? p.teamMembers.size() : 0}"></td>
                            <td class="small" th:text="${p.startDate != null ? p.startDate : '—'}"></td>
                            <td class="small" th:text="${p.endDate != null ? p.endDate : '—'}"></td>
                            <td class="text-end pe-3">
                                <a th:href="@{/admin/project/edit/{id}(id=${p.id})}"
                                   class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-pencil"></i> Edit
                                </a>
                                <a th:href="@{/admin/project/delete/{id}(id=${p.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Delete this project?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${projects.empty}">
                            <td colspan="9" class="text-center py-5 text-muted">
                                <i class="bi bi-folder2-open fs-2 d-block mb-2"></i>
                                No projects found. <a th:href="@{/admin/project/new}">Create one now</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<footer class="text-center py-3 mt-4 text-muted border-top" style="font-size:0.78rem;">&copy; 2026 Chaitanya. All rights reserved.</footer>
</body>
</html>
